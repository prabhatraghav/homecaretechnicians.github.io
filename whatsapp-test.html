<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Form Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h2 { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 py-12">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-[2.5rem] p-8 sm:p-12 border border-slate-100 shadow-xl">
            <h2 class="text-2xl font-black text-slate-900 uppercase mb-2">Test: WhatsApp Booking</h2>
            <p class="text-slate-600 mb-8 text-sm">This form sends data directly to your WhatsApp. No third-party servers involved.</p>

            <form x-data="{
                name: '',
                mobile: '',
                service: '',
                brand: '',
                product: '',
                address: '',
                sendToWhatsApp() {
                    const phone = '917599173900'; // Your primary number
                    const message = `*NEW SERVICE BOOKING*%0A%0A` +
                                   `*Name:* ${this.name}%0A` +
                                   `*Mobile:* ${this.mobile}%0A` +
                                   `*Service:* ${this.service}%0A` +
                                   `*Brand:* ${this.brand}%0A` +
                                   `*Product:* ${this.product}%0A` +
                                   `*Address/Issue:* ${this.address}`;
                    
                    window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
                }
            }" @submit.prevent="sendToWhatsApp()" class="space-y-6">

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                        <input type="text" x-model="name" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-2.5 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Mobile Number</label>
                        <input type="text" x-model="mobile" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-2.5 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Service Type</label>
                        <select x-model="service" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-2.5 text-sm">
                            <option value="">Select Service</option>
                            <option value="Repair">Repair Only</option>
                            <option value="Service">General Service</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Appliance Brand</label>
                        <input type="text" x-model="brand" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-2.5 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Select Product</label>
                    <select x-model="product" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-sm font-medium">
                        <option value="">What needs fixing?</option>
                        <option value="AC">AC (Air Conditioner)</option>
                        <option value="Washing Machine">Washing Machine</option>
                        <option value="Refrigerator">Refrigerator</option>
                        <option value="Microwave">Microwave Oven</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Address & Issue</label>
                    <textarea x-model="address" rows="4" required class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-2.5 text-sm resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-green-600 text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-green-700 shadow-xl shadow-green-600/20 transition">
                    Send via WhatsApp
                </button>
            </form>
        </div>
        <p class="text-center mt-6 text-slate-400 text-xs">This is a local test file. It will not be uploaded to GitHub yet.</p>
    </div>
</body>
</html>
