  <!-- Navigation (Consistent with main site) -->
  <header class="sticky top-0 z-50 w-full bg-white/95 backdrop-blur-md border-b border-slate-100 py-1.5 shadow-sm" x-data="{ mobileMenuOpen: false }">
    <div class="container mx-auto px-4">
      <nav class="flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 sm:gap-3 text-lg sm:text-xl font-bold tracking-tight text-slate-900 whitespace-nowrap">
          <img src="/logo.png" alt="Homecare Technicians Logo" class="h-10 w-10 sm:h-14 sm:w-14 object-contain">
          <span>Homecare <span class="text-blue-600">Technicians</span></span>
        </a>
        
        <!-- Desktop Menu -->
        <div class="hidden xl:flex gap-x-8 text-sm font-bold uppercase tracking-widest text-slate-700">
          <a href="/#services" class="hover:text-blue-600 transition">Our Services</a>
          <a href="/#why-us" class="hover:text-blue-600 transition">Why Us</a>
          <a href="/#about" class="hover:text-blue-600 transition">About Us</a>
          <a href="/blog/" class="hover:text-blue-600 transition">Blog</a>
          <a href="#quote-form" class="hover:text-blue-600 transition text-blue-600 font-black">Book Now</a>
          <a href="#contact" class="hover:text-blue-600 transition">Contact Info</a>
        </div>

        <div class="flex items-center gap-2 lg:gap-4">
          <!-- Quote Button -->
          <a href="#quote-form" class="hidden sm:inline-flex items-center rounded-full bg-blue-600 px-6 py-2.5 text-sm font-bold text-white hover:bg-blue-700 shadow-lg shadow-blue-600/20 transition transform active:scale-95 uppercase tracking-wider whitespace-nowrap">
            Get a Free Quote
          </a>
          
          <!-- Menu Button -->
          <button @click="mobileMenuOpen = !mobileMenuOpen" 
                  class="xl:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition focus:outline-none"
                  aria-label="Toggle menu">
            <svg x-show="!mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
            <svg x-show="mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: none;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </nav>
    </div>

    <!-- Mobile Menu Overlay -->
    <div x-show="mobileMenuOpen" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-4"
         class="absolute top-full left-0 right-0 z-50 bg-white border-b border-slate-100 shadow-xl xl:hidden"
         @click.away="mobileMenuOpen = false"
         style="display: none;">
      <div class="px-4 py-6 flex flex-col gap-y-4 text-center">
        <a href="/#services" @click="mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">Our Services</a>
        <a href="/#why-us" @click="mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">Why Us</a>
        <a href="/#about" @click="mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">About Us</a>
        <a href="/blog/" @click="mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">Blog</a>
        <a href="#quote-form" @click="mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-blue-600 hover:text-blue-700 transition font-black">Book Now</a>
        <a href="#contact" @click="mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">Contact Info</a>
        <a href="#quote-form" @click="mobileMenuOpen = false" class="mt-2 inline-flex items-center justify-center rounded-full bg-blue-600 px-6 py-3 text-sm font-bold text-white hover:bg-blue-700 transition uppercase tracking-widest sm:hidden shadow-lg shadow-blue-600/20">
          Get a Free Quote
        </a>
      </div>
    </div>
  </header>
