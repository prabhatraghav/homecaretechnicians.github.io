<header 
  class="sticky top-0 z-50 w-full bg-white/95 backdrop-blur-md border-b border-slate-100 py-1.5 shadow-sm" 
  x-data="{ 
    mobileMenuOpen: false,
    goTo(id, offset) {
      const el = document.getElementById(id);
      if (el) {
        const y = el.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top: y, behavior: 'smooth' });
      } else {
        window.location.href = '/#' + id;
      }
    }
  }"
>
  <div class="container mx-auto px-4">
    <nav class="flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 sm:gap-3 text-lg sm:text-xl font-bold tracking-tight text-slate-900 whitespace-nowrap">
        <img src="/logo.png" alt="Homecare Technicians Logo" class="h-10 w-10 sm:h-14 sm:w-14 object-contain">
        <span>Homecare <span class="text-blue-600">Technicians</span></span>
      </a>
      
      <!-- Desktop Menu -->
      <div class="hidden xl:flex gap-x-8 text-sm font-bold uppercase tracking-widest text-slate-700">
        <a href="/#services" @click.prevent="goTo('services', 30)" class="hover:text-blue-600 transition">Our Services</a>
        <a href="/#why-us" @click.prevent="goTo('why-us', 20)" class="hover:text-blue-600 transition">Why Us</a>
        <a href="/#about" @click.prevent="goTo('about', 20)" class="hover:text-blue-600 transition">About Us</a>

        <!-- ✅ Updated -->
        <a href="/#quote-form"
           @click.prevent="goTo('quote-form', 100)"
           class="hover:text-blue-600 transition text-blue-600 font-black">
          Book Now
        </a>
		
		<a href="/blog/"
			@click.prevent="document.getElementById('insights') 
				? goTo('insights', 10) 
				: window.location.href='/blog/'"
			class="hover:text-blue-600 transition">
			Insights
		</a>

        <a href="/#contact"
           @click.prevent="goTo('contact', 70)"
           class="hover:text-blue-600 transition">
          Contact Info
        </a>

      </div>

      <div class="flex items-center gap-2 lg:gap-4">
        <!-- ✅ Updated Button -->
        <a href="/#quote-form"
           @click.prevent="goTo('quote-form', 90)"
           class="hidden sm:inline-flex items-center rounded-full bg-blue-600 px-6 py-2.5 text-sm font-bold text-white hover:bg-blue-700 shadow-lg shadow-blue-600/20 transition transform active:scale-95 uppercase tracking-wider whitespace-nowrap">
          Get a Free Quote
        </a>
        
        <!-- Menu Button -->
        <button @click="mobileMenuOpen = !mobileMenuOpen" 
                class="xl:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition focus:outline-none"
                aria-label="Toggle menu">
          <svg x-show="!mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          <svg x-show="mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </nav>
  </div>

  <!-- Mobile Menu -->
  <div x-show="mobileMenuOpen" 
       x-transition
       class="absolute top-full left-0 right-0 z-50 bg-white border-b border-slate-100 shadow-xl xl:hidden"
       @click.away="mobileMenuOpen = false"
       style="display: none;">
    <div class="px-4 py-6 flex flex-col gap-y-4 text-center">
      <a href="/#services" @click.prevent="goTo('services', 55); mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">Our Services</a>
      <a href="/#why-us" @click.prevent="goTo('why-us', 0); mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">Why Us</a>
      <a href="/#about" @click.prevent="goTo('about', 0); mobileMenuOpen = false" class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">About Us</a>


      <!-- ✅ Updated -->
      <a href="/#quote-form"
         @click.prevent="goTo('quote-form', 60); mobileMenuOpen = false"
         class="py-2 text-sm font-bold uppercase tracking-widest text-blue-600 font-black">
        Book Now
      </a>
	  
	  <a href="/blog/"
			@click.prevent="document.getElementById('insights') 
			? (goTo('insights', 0), mobileMenuOpen = false) 
			: window.location.href='/blog/'"
		 class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">
		 Insights
	  </a>

      <a href="/#contact"
         @click.prevent="goTo('contact', 0); mobileMenuOpen = false"
         class="py-2 text-sm font-bold uppercase tracking-widest text-slate-700 hover:text-blue-600 transition">
        Contact Info
      </a>

      <!-- ✅ Updated Button -->
      <a href="/#quote-form"
         @click.prevent="goTo('quote-form', 60); mobileMenuOpen = false"
         class="mt-2 inline-flex items-center justify-center rounded-full bg-blue-600 px-6 py-3 text-sm font-bold text-white hover:bg-blue-700 transition uppercase tracking-widest sm:hidden shadow-lg shadow-blue-600/20">
        Get a Free Quote
      </a>
    </div>
  </div>
</header>
