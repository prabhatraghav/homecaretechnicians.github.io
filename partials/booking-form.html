                   sendToWhatsApp() {
                     
					 // Silent CRM Lead Capture
                     try {
                       const formData = new FormData();
                       formData.append('name', this.name);
                       formData.append('phone', this.mobile);
                       formData.append('email', this.email);
                       formData.append('address', this.address_description);
                       formData.append('issue', `${this.service_type} of ${this.brand} ${this.product}`);

                       // --- First Webhook (Existing) ---
					   fetch('https://hct-crm.homecaretechnicians.com/HCT-CRM/capture_lead.php', {
                         method: 'POST',
                         body: formData,
                         mode: 'no-cors'
                       });
					   
					   // --- Second Webhook (New) ---
					   fetch('https://hct-crm.homecaretechnicians.com/WhatsAppCRM/capture_lead.php', {
                         method: 'POST',
                         body: formData,
                         mode: 'no-cors'
                       });
					   
                     } catch (e) {
                       // Silent failure to ensure WhatsApp flow isn't interrupted
                     }

                     const phone = '917599173900';
                     const message = `*NEW BOOKING*\n\n` +
                                    `*Name:* ${this.name}\n` +
                                    `*Mobile:* ${this.mobile}\n` +
                                    `*Email:* ${this.email}\n` +
                                    `*Service:* ${this.service_type}\n` +
                                    `*Brand:* ${this.brand}\n` +
                                    `*Product:* ${this.product}\n` +
                                    `*Address & Issue:* ${this.address_description}`;
                     
                     window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
                   }
